language: en-US

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: false
  poem: false
  review_status: false
  collapse_walkthrough: true
  changed_files_summary: false
  sequence_diagrams: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - ".*"
  path_filters:
    - "!vendor/**"
    - "!testdata/**"
    - "!**/dist/**"
    - "!**/*_generated.go"
    - "!**/zz_generated_*.go"
    - "!**/bin/**"
    - "!**/reporting/**"
  tools:
    golangci-lint:
      enabled: false
    yamllint:
      enabled: false
    shellcheck:
      enabled: true
  pre_merge_checks:
    docstrings:
      mode: off

knowledge_base:
  opt_out: false
  code_guidelines:
    enabled: true
    filePatterns:
      # How we write code and ship it
      - .claude/CLAUDE.md
      - CONTRIBUTING.md
      - README.md
      - operator/README.md
      - agent/README.md
      # Domain vocabulary and semantic rules reviewers should enforce
      - docs/operator-status-definitions.md
      - docs/resource_management.md
      - docs/versioning.md
      - docs/interrupt_flow.md
      - docs/runtime_required.md
      - docs/ordering_of_skyhooks.md

chat:
  auto_reply: true
