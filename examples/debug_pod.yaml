apiVersion: v1
kind: Pod
metadata:
  name: debug-pod
  namespace: default
spec:
  nodeSelector:
    kubernetes.io/hostname: {{ some hostname }}
  containers:
  - command: ["sleep", "infinity"]
    image: busybox:latest
    imagePullPolicy: IfNotPresent
    name: debug
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 500m
        memory: 256Mi
    securityContext:
      privileged: true
    terminationMessagePath: /dev/termination-log
    terminationMessagePolicy: File
    volumeMounts:
    - mountPath: /host
      mountPropagation: HostToContainer
      name: root-mount
  dnsPolicy: ClusterFirst
  enableServiceLinks: true
  hostNetwork: true
  hostPID: true
  preemptionPolicy: PreemptLowerPriority
  priority: 0
  restartPolicy: Never
  schedulerName: default-scheduler
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  serviceAccount: default
  serviceAccountName: default
  terminationGracePeriodSeconds: 30
  tolerations:
  - key: node.kubernetes.io/unschedulable
    operator: Exists
  - effect: NoExecute
    key: node.kubernetes.io/not-ready
    operator: Exists
    tolerationSeconds: 300
  - effect: NoExecute
    key: node.kubernetes.io/unreachable
    operator: Exists
    tolerationSeconds: 300
  - key: skyhook.nvidia.com
    operator: Exists
  # tolerate nvidia.com/gpu=present:NoSchedule
  - effect: NoSchedule
    key: nvidia.com/gpu
    operator: Equal
    value: present
  # tolerate gpu-workers taint
  - key: nodeGroup
    operator: Equal
    value: gpu-workers
    effect: NoSchedule
  volumes:
  - hostPath:
      path: /
      type: ""
    name: root-mount
