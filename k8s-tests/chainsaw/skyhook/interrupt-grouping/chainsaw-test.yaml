# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: interrupt-grouping
spec:
  catch:
      ## if errors, print the most important info
    - get:
        apiVersion: v1
        kind: Node
        selector: skyhook.nvidia.com/test-node=skyhooke2e
        format: yaml
    - get:
        apiVersion: skyhook.nvidia.com/v1alpha1
        kind: Skyhook
        name: interrupt-grouping
        format: yaml
  timeouts:
    assert: 180s ## needs buffer since it fights with the interrupt test for cordoning nodes
  steps:
  - name: grouping
    description: Create an interrupt skyhook with group labels and verify nodes are processed respecting group constraints
    try:
    - script:
        content: |
          ## remove annotation from last run
          ../skyhook-cli reset interrupt-grouping --confirm 2>/dev/null || true
    - create:
        file: skyhook.yaml
    ## sequential: dax pod transitions through apply → config → interrupt → post-interrupt stages
    - assert:
        ## node in_progress, cordoned
        resource:
          kind: Node
          apiVersion: v1
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_interrupt-grouping: in_progress
            annotations:
              skyhook.nvidia.com/status_interrupt-grouping: in_progress
          spec:
            taints:
            - effect: NoSchedule
              key: node.kubernetes.io/unschedulable
          status:
            (conditions[?type == 'skyhook.nvidia.com/interrupt-grouping/NotReady']):
            - reason: "Incomplete"
              status: "True"
            (conditions[?type == 'skyhook.nvidia.com/interrupt-grouping/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## dax apply pod
        resource:
          kind: Pod
          apiVersion: v1
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/name: interrupt-grouping
              skyhook.nvidia.com/package: dax-1.2.3
            annotations:
              skyhook.nvidia.com/package: >-
                {"name":"dax","version":"1.2.3","skyhook":"interrupt-grouping","stage":"apply","image":"ghcr.io/nvidia/skyhook/agentless"}
            ownerReferences:
              - apiVersion: skyhook.nvidia.com/v1alpha1
                kind: Skyhook
                name: interrupt-grouping
          spec:
            initContainers:
              - name: dax-init
                image: ghcr.io/nvidia/skyhook/agentless:1.2.3
              - name: dax-apply
                image: ghcr.io/nvidia/skyhook/agentless:6.2.0
                args:
                  ([0]): apply
                  ([1]): /root
                  (length(@)): 3
              - name: dax-applycheck
                image: ghcr.io/nvidia/skyhook/agentless:6.2.0
                args:
                  ([0]): apply-check
                  ([1]): /root
                  (length(@)): 3
            (tolerations[?key == 'nvidia.com/gpu']):
              - operator: Exists
    - assert:
        ## dax config pod
        resource:
          kind: Pod
          apiVersion: v1
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/name: interrupt-grouping
              skyhook.nvidia.com/package: dax-1.2.3
            annotations:
              skyhook.nvidia.com/package: >-
                {"name":"dax","version":"1.2.3","skyhook":"interrupt-grouping","stage":"config","image":"ghcr.io/nvidia/skyhook/agentless"}
            ownerReferences:
              - apiVersion: skyhook.nvidia.com/v1alpha1
                kind: Skyhook
                name: interrupt-grouping
          spec:
            initContainers:
              - name: dax-init
              - name: dax-config
                args:
                  ([0]): config
                  ([1]): /root
                  (length(@)): 3
              - name: dax-configcheck
                args:
                  ([0]): config-check
                  ([1]): /root
                  (length(@)): 3
            (tolerations[?key == 'nvidia.com/gpu']):
              - operator: Exists
    - assert:
        ## dax interrupt pod
        resource:
          kind: Pod
          apiVersion: v1
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/name: interrupt-grouping
              skyhook.nvidia.com/package: dax-1.2.3
            annotations:
              ("skyhook.nvidia.com/package" && parse_json("skyhook.nvidia.com/package")):
                {
                  "name": "dax",
                  "version": "1.2.3",
                  "skyhook": "interrupt-grouping",
                  "stage": "interrupt",
                  "image": "ghcr.io/nvidia/skyhook/agentless"
                }
            ownerReferences:
              - apiVersion: skyhook.nvidia.com/v1alpha1
                kind: Skyhook
                name: interrupt-grouping
          spec:
            initContainers:
              - name: interrupt
                args:
                  ([0]): interrupt
                  ([1]): /root
                  (parse_json(base64_decode([3]))):
                    {
                        "type": "service_restart",
                        "services": [
                            "containerd",
                            "cron",
                            "foobar"
                        ]
                    }
                  (length(@)): 4
            (tolerations[?key == 'nvidia.com/gpu']):
              - operator: Exists
    - assert:
        ## dax post-interrupt pod
        resource:
          kind: Pod
          apiVersion: v1
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/name: interrupt-grouping
              skyhook.nvidia.com/package: dax-1.2.3
            annotations:
              skyhook.nvidia.com/package: >-
                {"name":"dax","version":"1.2.3","skyhook":"interrupt-grouping","stage":"post-interrupt","image":"ghcr.io/nvidia/skyhook/agentless"}
            ownerReferences:
              - apiVersion: skyhook.nvidia.com/v1alpha1
                kind: Skyhook
                name: interrupt-grouping
          spec:
            initContainers:
              - name: dax-init
              - name: dax-post-interrupt
                args:
                  ([0]): post-interrupt
                  ([1]): /root
                  (length(@)): 3
              - name: dax-post-interruptcheck
                args:
                  ([0]): post-interrupt-check
                  ([1]): /root
                  (length(@)): 3
            (tolerations[?key == 'nvidia.com/gpu']):
              - operator: Exists
    - assert:
        ## node complete, uncordoned
        resource:
          kind: Node
          apiVersion: v1
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_interrupt-grouping: complete
            annotations:
              (length("skyhook.nvidia.com/version_interrupt-grouping") >= `6`): true
              skyhook.nvidia.com/nodeState_interrupt-grouping: >-
                {"dax|1.2.3":{"name":"dax","version":"1.2.3","image":"ghcr.io/nvidia/skyhook/agentless","stage":"post-interrupt","state":"complete"},"zeb|2.1.4":{"name":"zeb","version":"2.1.4","image":"ghcr.io/nvidia/skyhook/agentless","stage":"post-interrupt","state":"complete"}}
              skyhook.nvidia.com/status_interrupt-grouping: complete
            (!taints || length(taints)==`0` || (taints && !not_null(taints))): true ## taints should be empty or not exist
          status:
            (conditions[?type == 'skyhook.nvidia.com/interrupt-grouping/NotReady']):
            - reason: "Complete"
              status: "False"
            (conditions[?type == 'skyhook.nvidia.com/interrupt-grouping/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## skyhook complete
        resource:
          kind: Skyhook
          apiVersion: skyhook.nvidia.com/v1alpha1
          metadata:
            name: interrupt-grouping
            annotations:
              ## test that version info is present
              ## the quotes are to escape the . and / in the key
              (length("skyhook.nvidia.com/version") >= `6`): true
          status:
            status: complete
            (to_number(observedGeneration) == `2` || to_number(observedGeneration) == `3`): true ## migrate seems to add 1, but not in all cases it seems
            nodeState:
              (values(@)):
                - dax|1.2.3:
                    name: dax
                    stage: post-interrupt
                    state: complete
                    version: 1.2.3
                    image: ghcr.io/nvidia/skyhook/agentless
                  zeb|2.1.4:
                    name: zeb
                    stage: post-interrupt
                    state: complete
                    version: 2.1.4
                    image: ghcr.io/nvidia/skyhook/agentless
            nodeStatus:
              (values(@)):
                - complete
    - assert:
        ## node-meta configmap
        resource:
          kind: ConfigMap
          apiVersion: v1
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/skyhook-node-meta: interrupt-grouping
            ownerReferences:
            - apiVersion: skyhook.nvidia.com/v1alpha1
              blockOwnerDeletion: true
              controller: true
              kind: Skyhook
              name: interrupt-grouping
          data:
            (length(@)): 3
            labels.json:
              (contains(@, 'skyhook.nvidia.com/test-node')): true
              (contains(@, 'skyhook.nvidia.com/status_interrupt-grouping')): true
            annotations.json:
              (contains(@, 'skyhook.nvidia.com/status_interrupt-grouping')): true
              (contains(@, 'skyhook.nvidia.com/nodeState_interrupt-grouping')): true
            packages.json:
              (contains(@, '"agentVersion"')): true
              (contains(@, '"dax"')): true
