# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: uninstall-upgrade-skyhook
spec:
  timeouts:
    assert: 180s
  catch: ## if errors, print the most important info
    - get:
        apiVersion: v1
        kind: Node
        selector: skyhook.nvidia.com/test-node=skyhooke2e
        format: yaml
    - get:
        apiVersion: skyhook.nvidia.com/v1alpha1
        kind: Skyhook
        name: uninstall-upgrade-skyhook
        format: yaml
  steps:
  - name: initial install
    description: Reset node state, create skyhook with packages, and verify initial installation completes
    try:
    - script:
        content: |
          ## remove annotation/labels from last run
          ../skyhook-cli reset uninstall-upgrade-skyhook --confirm 2>/dev/null || true
    - create:
        file: skyhook.yaml
    ## parallel: all docs checked simultaneously — in_progress and complete Node checks
    ## match the same node at different lifecycle points, works because Chainsaw retries
    ## until all docs match at once
    - assert:
        file: assert-install.yaml
  - name: upgrade
    description: Update skyhook with new package versions and verify the upgrade completes
    try:
    - update:
        file: update.yaml
    ## sequential: node/pods transition through uninstall/upgrade stages
    - assert:
        ## node in_progress with uninstall/upgrade stages
        ## NOTE: cats is no longer here — removed from spec with enabled=false means
        ## RemoveState is called directly (no uninstall pod). Only dogs downgrade and
        ## nullptr upgrade trigger pods.
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_uninstall-upgrade-skyhook: in_progress
            annotations:
              ("skyhook.nvidia.com/nodeState_uninstall-upgrade-skyhook" && parse_json("skyhook.nvidia.com/nodeState_uninstall-upgrade-skyhook")):
                {
                  "dogs|1.2.5": {
                      "name": "dogs",
                      "version": "1.2.5",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "uninstall",
                      "state": "skipped"
                  },
                  "dogs|1.2.6": {
                      "name": "dogs",
                      "version": "1.2.6",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "uninstall",
                      "state": "in_progress"
                  },
                  "nullptr|2.0.1": {
                      "name": "nullptr",
                      "version": "2.0.1",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "upgrade",
                      "state": "in_progress"
                  }
                }
              skyhook.nvidia.com/status_uninstall-upgrade-skyhook: in_progress
          spec:
            taints:
            - effect: NoSchedule
              key: node.kubernetes.io/unschedulable
          status:
            (conditions[?type == 'skyhook.nvidia.com/uninstall-upgrade-skyhook/NotReady']):
            - reason: "Incomplete"
              status: "True"
            (conditions[?type == 'skyhook.nvidia.com/uninstall-upgrade-skyhook/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## dogs uninstall pod
        resource:
          kind: Pod
          apiVersion: v1
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/name: uninstall-upgrade-skyhook
              skyhook.nvidia.com/package: dogs-1.2.6
            annotations:
              ("skyhook.nvidia.com/package" && parse_json("skyhook.nvidia.com/package")):
                {
                  "name": "dogs",
                  "version": "1.2.6",
                  "skyhook": "uninstall-upgrade-skyhook",
                  "stage": "uninstall",
                  "image": "ghcr.io/nvidia/skyhook/agentless"
                }
            ownerReferences:
              - apiVersion: skyhook.nvidia.com/v1alpha1
                kind: Skyhook
                name: uninstall-upgrade-skyhook
          spec:
            initContainers:
              - name: dogs-init
              - name: dogs-uninstall
                args:
                  ([0]): uninstall
                  ([1]): /root
                  (length(@)): 3
              - name: dogs-uninstallcheck
                args:
                  ([0]): uninstall-check
                  ([1]): /root
                  (length(@)): 3
    - assert:
        ## nullptr upgrade pod
        resource:
          kind: Pod
          apiVersion: v1
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/name: uninstall-upgrade-skyhook
              skyhook.nvidia.com/package: nullptr-2.0.1
            annotations:
              ("skyhook.nvidia.com/package" && parse_json("skyhook.nvidia.com/package")):
                {
                  "name": "nullptr",
                  "version": "2.0.1",
                  "skyhook": "uninstall-upgrade-skyhook",
                  "stage": "upgrade",
                  "image": "ghcr.io/nvidia/skyhook/agentless"
                }
            ownerReferences:
              - apiVersion: skyhook.nvidia.com/v1alpha1
                kind: Skyhook
                name: uninstall-upgrade-skyhook
          spec:
            initContainers:
              - name: nullptr-init
              - name: nullptr-upgrade
                args:
                  ([0]): upgrade
                  ([1]): /root
                  (length(@)): 3
              - name: nullptr-upgradecheck
                args:
                  ([0]): upgrade-check
                  ([1]): /root
                  (length(@)): 3
    - assert:
        ## node complete after upgrade
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_uninstall-upgrade-skyhook: complete
            annotations:
              ("skyhook.nvidia.com/nodeState_uninstall-upgrade-skyhook" && parse_json("skyhook.nvidia.com/nodeState_uninstall-upgrade-skyhook")):
                {
                  "dogs|1.2.5": {
                      "name": "dogs",
                      "version": "1.2.5",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  },
                  "nullptr|2.0.1": {
                      "name": "nullptr",
                      "version": "2.0.1",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  }
                }
              skyhook.nvidia.com/status_uninstall-upgrade-skyhook: complete
          status:
            (conditions[?type == 'skyhook.nvidia.com/uninstall-upgrade-skyhook/NotReady']):
            - reason: "Complete"
              status: "False"
            (conditions[?type == 'skyhook.nvidia.com/uninstall-upgrade-skyhook/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## skyhook complete after upgrade
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: uninstall-upgrade-skyhook
          status:
            status: complete
            completeNodes: 1/1
            packageList: dogs:1.2.5,nullptr:2.0.1
            nodesInProgress: 0
            nodeState:
              (values(@)):
                - dogs|1.2.5:
                    name: dogs
                    state: complete
                    version: '1.2.5'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
                  nullptr|2.0.1:
                    name: nullptr
                    state: complete
                    version: '2.0.1'
                    stage: post-interrupt
                    image: ghcr.io/nvidia/skyhook/agentless
            nodeStatus:
              (values(@)):
                - complete
    ## parallel: configmaps are distinct steady-state resources
    - assert:
        file: assert-cm-update.yaml
  - name: uninstall
    description: >
      Remove all packages from the skyhook and verify state is cleaned up.
      With the explicit uninstall model, removing enabled=false packages from
      spec calls RemoveState directly — no uninstall pods are created.
    try:
    - sleep:
        duration: 5s
    - update:
        file: update-no-packages.yaml
    - assert:
        ## node complete with empty nodeState (RemoveState cleans up immediately)
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_uninstall-upgrade-skyhook: complete
            annotations:
              skyhook.nvidia.com/nodeState_uninstall-upgrade-skyhook: '{}'
              skyhook.nvidia.com/status_uninstall-upgrade-skyhook: complete
          status:
            (conditions[?type == 'skyhook.nvidia.com/uninstall-upgrade-skyhook/NotReady']):
            - reason: "Complete"
              status: "False"
            (conditions[?type == 'skyhook.nvidia.com/uninstall-upgrade-skyhook/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## skyhook complete with no packages
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: uninstall-upgrade-skyhook
          status:
            status: complete
            completeNodes: 1/1
            packageList: ""
            nodesInProgress: 0
            nodeState:
              (values(@)): {}
            nodeStatus:
              (values(@)):
                - complete
