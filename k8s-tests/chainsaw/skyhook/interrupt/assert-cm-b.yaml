# ConfigMaps for interrupt assert-b (parallel: distinct steady-state resources)
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: interrupt-dexter-1.2.3
  namespace: skyhook
  labels:
    skyhook.nvidia.com/name: interrupt
  ownerReferences:
  - apiVersion: skyhook.nvidia.com/v1alpha1
    blockOwnerDeletion: true
    controller: true
    kind: Skyhook
    name: interrupt
data:
  game.properties: |
    enemies=aliens
    lives=3
    enemies.cheat=true
    enemies.cheat.level=noGoodRotten
  ui.properties: |
    color.good=purple
    color.bad=yellow
    allow.textmode=true
    how.nice.to.look=fairlyNice
---
kind: ConfigMap
apiVersion: v1
metadata:
  namespace: skyhook
  labels:
    skyhook.nvidia.com/skyhook-node-meta: interrupt
  ownerReferences:
  - apiVersion: skyhook.nvidia.com/v1alpha1
    blockOwnerDeletion: true
    controller: true
    kind: Skyhook
    name: interrupt
data:
  (length(@)): 3
  labels.json:
    (contains(@, 'skyhook.nvidia.com/test-node')): true
    (contains(@, 'skyhook.nvidia.com/status_interrupt')): true
  annotations.json:
    (contains(@, 'skyhook.nvidia.com/status_interrupt')): true
    (contains(@, 'skyhook.nvidia.com/nodeState_interrupt')): true
  packages.json:
    (contains(@, '"agentVersion"')): true
    (contains(@, '"dexter"')): true
