# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: interrupt

spec:
  timeouts:
    assert: 180s ## slow packages (SLEEP_LEN=8), interruptionBudget count=1, contention with interrupt-grouping
  catch: ## if errors, print the most important info
    - get:
        apiVersion: v1
        kind: Node
        selector: skyhook.nvidia.com/test-node=skyhooke2e
        format: yaml
    - get:
        apiVersion: skyhook.nvidia.com/v1alpha1
        kind: Skyhook
        name: interrupt
        format: yaml
  steps:
  - name: interrupt
    description: Verify nodes cordon and drain before applying packages, then uncordon after interrupt completes
    try:
    - script:
        content: |
          ## remove annotation from last run
          ../skyhook-cli reset interrupt --confirm 2>/dev/null || true
    - create:
        file: pod.yaml
    - wait:
        apiVersion: v1
        kind: Pod
        name: important-stuff
        timeout: 30s
        for:
          condition:
            name: Ready
            value: 'true'
    - wait:
        apiVersion: v1
        kind: Pod
        name: drain-on
        timeout: 30s
        for:
          condition:
            name: Ready
            value: 'true'
    - create:
        file: skyhook.yaml
    ## sequential: pod/node transition through lifecycle stages (was assert-a.yaml)
    - assert:
        ## jason apply pod exists
        resource:
          kind: Pod
          apiVersion: v1
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/name: interrupt
              skyhook.nvidia.com/package: jason-1.3.2
            annotations:
              ("skyhook.nvidia.com/package" && parse_json("skyhook.nvidia.com/package")):
                {
                  "name": "jason",
                  "version": "1.3.2",
                  "skyhook": "interrupt",
                  "stage": "apply",
                  "image": "ghcr.io/nvidia/skyhook/agentless"
                }
            ownerReferences:
              - apiVersion: skyhook.nvidia.com/v1alpha1
                kind: Skyhook
                name: interrupt
          spec:
            initContainers:
              - name: jason-init
                image: ghcr.io/nvidia/skyhook/agentless:1.3.2
              - name: jason-apply
                image: ghcr.io/nvidia/skyhook/agentless:3.2.3
                args:
                  ([0]): apply
                  ([1]): /root
                  (length(@)): 3
              - name: jason-applycheck
                image: ghcr.io/nvidia/skyhook/agentless:3.2.3
                args:
                  ([0]): apply-check
                  ([1]): /root
                  (length(@)): 3
    - assert:
        ## node in_progress with jason at config complete, cordoned
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_interrupt: in_progress
            annotations:
              ("skyhook.nvidia.com/nodeState_interrupt" && parse_json("skyhook.nvidia.com/nodeState_interrupt")):
                {
                  "jason|1.3.2": {
                      "name": "jason",
                      "version": "1.3.2",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "config",
                      "state": "complete"
                  }
                }
              skyhook.nvidia.com/status_interrupt: in_progress
          spec:
            taints:
            - effect: NoSchedule
              key: node.kubernetes.io/unschedulable
          status:
            (conditions[?type == 'skyhook.nvidia.com/interrupt/NotReady']):
            - reason: "Incomplete"
              status: "True"
            (conditions[?type == 'skyhook.nvidia.com/interrupt/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        file: assert-important-stuff.yaml
    - assert:
        file: assert-drain-me.yaml
    - delete:
        file: assert-important-stuff.yaml
    - error:
        file: assert-drain-me.yaml
    ## sequential: node/pod/skyhook transition through lifecycle stages (was assert-b.yaml)
    - assert:
        ## node in_progress with jason/dexter/john, cordoned
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_interrupt: in_progress
            annotations:
              ("skyhook.nvidia.com/nodeState_interrupt" && parse_json("skyhook.nvidia.com/nodeState_interrupt")):
                {
                  "jason|1.3.2": {
                      "name": "jason",
                      "version": "1.3.2",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "config",
                      "state": "complete"
                  },
                  "dexter|1.2.3": {
                      "name": "dexter",
                      "version": "1.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "apply",
                      "state": "in_progress"
                  },
                  "john|1.2.3": {
                      "name": "john",
                      "version": "1.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "apply",
                      "state": "in_progress"
                  }
                }
              skyhook.nvidia.com/cordon_interrupt: "true"
              skyhook.nvidia.com/status_interrupt: in_progress
          spec:
            taints:
            - effect: NoSchedule
              key: node.kubernetes.io/unschedulable
          status:
            (conditions[?type == 'skyhook.nvidia.com/interrupt/NotReady']):
            - reason: "Incomplete"
              status: "True"
            (conditions[?type == 'skyhook.nvidia.com/interrupt/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## dexter interrupt pod exists
        resource:
          kind: Pod
          apiVersion: v1
          metadata:
            namespace: skyhook
            labels:
              skyhook.nvidia.com/name: interrupt
              skyhook.nvidia.com/package: dexter-1.2.3
            annotations:
              ("skyhook.nvidia.com/package" && parse_json("skyhook.nvidia.com/package")):
                {
                    "name": "dexter",
                    "version": "1.2.3",
                    "skyhook": "interrupt",
                    "stage": "interrupt",
                    "image": "ghcr.io/nvidia/skyhook/agentless"
                }
            ownerReferences:
              - apiVersion: skyhook.nvidia.com/v1alpha1
                kind: Skyhook
                name: interrupt
          spec:
            initContainers:
              - name: interrupt
                args:
                  ([0]): interrupt
                  ([1]): /root
                  (parse_json(base64_decode([3]))):
                    {
                      "type": "node_restart",
                    }
                  (length(@)): 4
    - assert:
        ## node complete with all packages done, uncordoned
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
              skyhook.nvidia.com/status_interrupt: complete
            annotations:
              ("skyhook.nvidia.com/nodeState_interrupt" && parse_json("skyhook.nvidia.com/nodeState_interrupt")):
                {
                  "baxter|3.3": {
                      "name": "baxter",
                      "version": "3.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  },
                  "dexter|1.2.3": {
                      "name": "dexter",
                      "version": "1.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "post-interrupt",
                      "state": "complete"
                  },
                  "foobar|1.2": {
                      "name": "foobar",
                      "version": "1.2",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "config",
                      "state": "complete"
                  },
                  "jason|1.3.2": {
                      "name": "jason",
                      "version": "1.3.2",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "config",
                      "state": "complete"
                  },
                  "spencer|3.2.3": {
                      "name": "spencer",
                      "version": "3.2.3",
                      "image": "ghcr.io/nvidia/skyhook/agentless",
                      "stage": "config",
                      "state": "complete"
                  }
                }
              skyhook.nvidia.com/status_interrupt: complete
            (!taints || length(taints)==`0` || (taints && !not_null(taints))): true ## taints should be empty or not exist
          status:
            (conditions[?type == 'skyhook.nvidia.com/interrupt/NotReady']):
            - reason: "Complete"
              status: "False"
            (conditions[?type == 'skyhook.nvidia.com/interrupt/Erroring']):
            - reason: "Not Erroring"
              status: "False"
    - assert:
        ## skyhook complete
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: interrupt
          status:
            status: complete
            observedGeneration: 2
            nodeState:
              (values(@)):
                - baxter|3.3:
                    name: baxter
                    stage: post-interrupt
                    state: complete
                    version: "3.3"
                    image: ghcr.io/nvidia/skyhook/agentless
                  dexter|1.2.3:
                    name: dexter
                    stage: post-interrupt
                    state: complete
                    version: 1.2.3
                    image: ghcr.io/nvidia/skyhook/agentless
                  foobar|1.2:
                    name: foobar
                    stage: config
                    state: complete
                    version: "1.2"
                    image: ghcr.io/nvidia/skyhook/agentless
                  spencer|3.2.3:
                    name: spencer
                    stage: config
                    state: complete
                    version: 3.2.3
                    image: ghcr.io/nvidia/skyhook/agentless
            nodeStatus:
              (values(@)):
                - complete
    ## parallel: configmaps are distinct steady-state resources
    - assert:
        file: assert-cm-b.yaml
