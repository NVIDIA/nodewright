# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: uninstall-finalizer-fix
spec:
  timeouts:
    assert: 240s
  catch:
    - get:
        apiVersion: v1
        kind: Node
        selector: skyhook.nvidia.com/test-node=skyhooke2e
        format: yaml
    - get:
        apiVersion: skyhook.nvidia.com/v1alpha1
        kind: Skyhook
        name: uninstall-finalizer-fix
        format: yaml
  steps:
  - name: install
    description: Install package with a bad uninstall.sh (enabled=true, apply=false)
    try:
    - script:
        content: |
          ../skyhook-cli reset uninstall-finalizer-fix --confirm 2>/dev/null || true
    - create:
        file: skyhook.yaml
    - assert:
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: uninstall-finalizer-fix
          status:
            status: complete

  - name: delete-cr-and-observe-failure
    description: >
      Delete the CR. The finalizer triggers uninstall, but the bad uninstall.sh
      causes the pod to fail. Assert the UninstallFailed condition is set.
    try:
    - script:
        content: |
          kubectl delete skyhook uninstall-finalizer-fix --wait=false
    - assert:
        ## node should show erroring state for the uninstall. The erroring
        ## state keeps restarting the pod so "restarts" in the blob increments
        ## unpredictably — assert only the stable fields (name, stage, state).
        resource:
          apiVersion: v1
          kind: Node
          metadata:
            labels:
              skyhook.nvidia.com/test-node: skyhooke2e
            annotations:
              (parse_json("skyhook.nvidia.com/nodeState_uninstall-finalizer-fix")."mypkg|2.1.4".name == 'mypkg'): true
              (parse_json("skyhook.nvidia.com/nodeState_uninstall-finalizer-fix")."mypkg|2.1.4".stage == 'uninstall'): true
              (parse_json("skyhook.nvidia.com/nodeState_uninstall-finalizer-fix")."mypkg|2.1.4".state == 'erroring'): true
    - assert:
        ## UninstallFailed condition should be set
        resource:
          apiVersion: skyhook.nvidia.com/v1alpha1
          kind: Skyhook
          metadata:
            name: uninstall-finalizer-fix
          status:
            (conditions[?type == 'nodewright.nvidia.com/UninstallFailed']):
            - status: "True"
              reason: "UninstallPodFailing"

  - name: fix-spec-and-verify-deletion
    description: >
      The spec remains editable while the CR is being deleted — update
      EXIT_CODE from "1" to "0". The operator detects the spec change,
      invalidates the failing pod, and creates a new pod with the fixed
      env. Uninstall succeeds, finalizer cleans up, CR is deleted.
    try:
    - update:
        file: update-fix-exit-code.yaml
    - script:
        ## Verify the CR is eventually deleted
        content: |
          for i in $(seq 1 60); do
            if ! kubectl get skyhook uninstall-finalizer-fix 2>/dev/null; then
              echo "CR deleted successfully"
              exit 0
            fi
            sleep 3
          done
          echo "CR still exists after timeout"
          exit 1
        timeout: 240s
